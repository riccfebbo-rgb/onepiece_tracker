<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Piece — Episode Tracker</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #faf9f6; --surface: #f2f0eb; --border: #e0ddd5;
    --text: #1a1917; --text-muted: #6b6860; --text-hint: #a09d96;
    --canon-bg: #ffffff; --filler-bg: #fff0f0; --filler-border: #f5c4c4; --filler-text: #8b2020;
    --mixed-bg: #fffbf0; --mixed-border: #f0d890; --mixed-text: #7a5c10;
    --accent: #1D9E75; --star-off: #ddd; --star-on: #e8a020;
  }
  
  body.dark {
    --bg: #121212; --surface: #1e1e1e; --border: #333333;
    --text: #e0e0e0; --text-muted: #aaaaaa; --text-hint: #777777;
    --canon-bg: #1a1a1a; --filler-bg: #2a1010; --filler-border: #4a1c1c; --filler-text: #ff8888;
    --mixed-bg: #2a2210; --mixed-border: #4a3c1c; --mixed-text: #ffcc55;
    --accent: #23c596; 
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
  .page { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .auth-bar { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 10px; padding: 10px 16px; margin-bottom: 1.5rem; transition: background 0.3s; }
  .auth-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; display: none; }
  .auth-name { font-size: 13px; font-weight: 500; flex: 1; }
  .auth-hint { font-size: 13px; color: var(--text-muted); flex: 1; }
  .auth-sync { font-size: 11px; color: var(--text-hint); }
  .btn-google { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.2s;}
  .btn-google:hover { background: var(--surface); }
  .btn-google svg { width: 16px; height: 16px; flex-shrink: 0; }
  .btn-logout { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all 0.2s;}
  .btn-logout:hover { background: var(--surface); }

  .top-bar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; transition: border-color 0.3s; }
  .logo-title { font-size: 24px; font-weight: 500; letter-spacing: -0.5px; }
  .logo-sub { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 14px; color: var(--text-muted); margin-left: 10px; }
  .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .next-ep-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 10px; padding: 12px 16px; margin-bottom: 1.25rem; flex-wrap: wrap; transition: background 0.3s; }
  .next-ep-label { font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
  .next-ep-info  { font-size: 14px; font-weight: 500; flex: 1; min-width: 120px; }
  .next-ep-type  { font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
  .next-ep-type.canon  { background: #e1f5ee; color: #0f6e56; }
  body.dark .next-ep-type.canon { background: #0f4d3d; color: #8ef0d3; }
  .next-ep-type.filler { background: var(--filler-bg); color: var(--filler-text); }
  .next-ep-type.mixed  { background: var(--mixed-bg);  color: var(--mixed-text); }
  .next-btns { display: flex; gap: 8px; }
  .next-ep-goto  { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; white-space: nowrap; transition: background 0.2s;}
  .next-ep-goto:hover { background: var(--surface); }
  .next-ep-watch { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 1px solid var(--accent); background: var(--accent); color: #fff; font-family: inherit; white-space: nowrap; text-decoration: none; display: inline-block; transition: opacity 0.2s;}
  .next-ep-watch:hover { opacity: 0.85; }

  /* Modificata per supportare 5 colonne (aggiunto il tempo) */
  .stats-row { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--surface); border-radius: 10px; padding: 12px 16px; transition: background 0.3s; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-hint); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }

  .progress-wrap { background: var(--surface); border-radius: 99px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 13px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .filter-btn:hover:not(.active) { background: var(--surface); }
  .spacer { flex: 1; min-width: 20px; }
  .ep-search { font-size: 13px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--canon-bg); color: var(--text); font-family: inherit; width: 150px; transition: background 0.3s, color 0.3s; }
  .ep-search:focus { outline: none; border-color: var(--accent); }

  .legend { display: flex; gap: 14px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .ldot { width: 13px; height: 13px; border-radius: 3px; border: 1px solid; }

  .saga { margin-bottom: 1.75rem; }
  .saga-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .saga-icon { font-size: 15px; }
  .saga-name { font-size: 14px; font-weight: 500; }
  .saga-range { font-size: 12px; color: var(--text-hint); }
  .saga-progress { font-size: 12px; color: var(--text-muted); }
  .saga-btn { margin-left: auto; font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: background 0.2s;}
  .saga-btn:hover { background: var(--surface); }

  .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 4px; }
  .ep { border-radius: 6px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: 1px solid; transition: transform 0.1s; user-select: none; position: relative; font-weight: 400; }
  .ep:hover { transform: scale(1.07); z-index: 2; }
  .ep:active { transform: scale(0.97); }
  .ep.canon  { background: var(--canon-bg);  color: var(--text);        border-color: var(--border); }
  .ep.filler { background: var(--filler-bg); color: var(--filler-text); border-color: var(--filler-border); }
  .ep.mixed  { background: var(--mixed-bg);  color: var(--mixed-text);  border-color: var(--mixed-border); }
  .ep.watched { opacity: 0.28; }
  .ep.watched::after { content:''; position:absolute; top:50%; left:15%; right:15%; height:1.5px; background:currentColor; border-radius:1px; transform:translateY(-50%) rotate(-10deg); }
  .ep.has-rating::before { content:''; position:absolute; bottom:3px; right:3px; width:5px; height:5px; border-radius:50%; background: var(--star-on); }
  .ep.next-highlight { outline: 2.5px solid var(--accent); outline-offset: 1px; }

  .tt { position:fixed; pointer-events:none; z-index:8888; display:none; background:#1c1a18; color:#f5f3ef; border-radius:10px; padding:9px 12px; font-size:12px; line-height:1.5; width:180px; }
  .tt-num  { font-size:10px; opacity:0.45; margin-bottom:1px; }
  .tt-type { font-size:11px; margin-bottom:7px; }
  .tt-stars-label { font-size:10px; opacity:0.45; margin-bottom:3px; }
  .tt-stars { display:flex; gap:2px; margin-bottom:4px; }
  .tt-star  { font-size:18px; color:var(--star-off); line-height:1; }
  .tt-star.on { color:var(--star-on); }
  .tt-hint  { font-size:10px; opacity:0.3; margin-top:4px; }

  .modal-overlay { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg); border-radius:16px; border:1px solid var(--border); width:100%; max-width:340px; padding:1.5rem; animation:mpop 0.18s cubic-bezier(.34,1.56,.64,1); transition: background 0.3s; }
  @keyframes mpop { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
  .modal-ep-num   { font-size:11px; color:var(--text-hint); margin-bottom:4px; }
  .modal-ep-title { font-size:22px; font-weight:500; }
  .modal-close    { font-size:22px; color:var(--text-hint); cursor:pointer; background:none; border:none; line-height:1; padding:0 0 0 12px; flex-shrink:0; }
  .modal-close:hover { color:var(--text); }
  .modal-badge { display:inline-block; font-size:12px; padding:3px 10px; border-radius:99px; margin-bottom:1.25rem; }
  .modal-badge.canon  { background:#e1f5ee; color:#0f6e56; }
  body.dark .modal-badge.canon { background: #0f4d3d; color: #8ef0d3; }
  .modal-badge.filler { background:var(--filler-bg); color:var(--filler-text); }
  .modal-badge.mixed  { background:var(--mixed-bg);  color:var(--mixed-text); }
  .modal-label { font-size:11px; color:var(--text-hint); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
  .modal-stars { display:flex; gap:4px; margin-bottom:1.25rem; }
  .modal-star  { font-size:28px; cursor:pointer; color:var(--star-off); transition:color 0.1s; line-height:1; }
  .modal-star.on { color:var(--star-on); }
  .modal-row { display:flex; gap:8px; margin-bottom:8px; }
  .modal-btn { flex:1; font-size:13px; padding:9px 10px; border-radius:9px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-family:inherit; text-align:center; text-decoration:none; display:block; transition:background 0.12s; }
  .modal-btn:hover { background:var(--border); }
  .modal-btn.copied { background:#e1f5ee; color:#0f6e56; border-color:#9FE1CB; }
  body.dark .modal-btn.copied { background: #0f4d3d; color: #8ef0d3; border-color: #1D9E75; }
  .modal-btn-main { width:100%; font-size:14px; padding:11px 14px; border-radius:9px; border:none; cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.15s; }
  .modal-btn-main.mark   { background:var(--accent); color:#fff; }
  .modal-btn-main.mark:hover { opacity:0.88; }
  .modal-btn-main.unmark { background:var(--surface); color:var(--text-muted); border:1px solid var(--border); }
  .modal-btn-main.unmark:hover { background:var(--filler-bg); color:var(--filler-text); border-color:var(--filler-border); }

  .btn { font-size:12px; padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .btn:hover { background:var(--surface); }
  .btn.danger:hover { background:var(--filler-bg); color:var(--filler-text); border-color:var(--filler-border); }
  .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn.primary:hover { opacity:0.88; }

  @media(max-width:500px){
    /* Su mobile le statistiche si dividono su più righe */
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .top-bar { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="auth-bar" id="auth-bar">
    <img class="auth-avatar" id="auth-avatar" src="" alt="">
    <span class="auth-name" id="auth-name" style="display:none"></span>
    <span class="auth-hint" id="auth-hint">Accedi per sincronizzare i progressi su tutti i dispositivi</span>
    <span class="auth-sync" id="auth-sync" style="display:none"></span>
    <button class="btn-google" id="btn-login">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Accedi
    </button>
    <button class="btn-logout" id="btn-logout" style="display:none">Esci</button>
  </div>

  <div class="top-bar">
    <div>
      <span class="logo-title">One Piece</span>
      <span class="logo-sub">episode tracker</span>
    </div>
    <div class="top-actions">
      <button class="btn" id="btn-theme">🌙 Tema</button>
      <button class="btn primary" id="btn-skip-filler">Salta tutti i filler</button>
      <button class="btn danger"  id="btn-reset">Reset</button>
    </div>
  </div>

  <div class="next-ep-bar">
    <span class="next-ep-label">Prossimo da vedere</span>
    <span class="next-ep-info" id="next-info">—</span>
    <div class="next-btns">
      <button class="next-ep-goto" id="btn-next">Scorri ↓</button>
      <a class="next-ep-watch" id="link-next-ita" href="#" target="_blank">▶ ITA</a>
      <a class="next-ep-watch" id="link-next-sub" href="#" target="_blank" style="background:var(--surface);color:var(--text-muted);border-color:var(--border);">▶ SUB</a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">Visti</div><div class="stat-value" id="st-watched">0</div></div>
    <div class="stat"><div class="stat-label">Canonici visti</div><div class="stat-value" id="st-canon">0</div></div>
    <div class="stat"><div class="stat-label">Filler saltati</div><div class="stat-value" id="st-filler">0</div></div>
    <div class="stat"><div class="stat-label">Totale episodi</div><div class="stat-value" id="st-total">0</div></div>
    <div class="stat"><div class="stat-label">Tempo speso</div><div class="stat-value" id="st-time">0h</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="toolbar">
    <button class="filter-btn active" data-f="all">Tutti</button>
    <button class="filter-btn" data-f="canon">Canonici</button>
    <button class="filter-btn" data-f="filler">Filler</button>
    <button class="filter-btn" data-f="unwatched">Da vedere</button>
    <button class="filter-btn" data-f="rated">Votati</button>
    <div class="spacer"></div>
    <input class="ep-search" type="number" placeholder="Vai all'ep. #" id="ep-search" min="1">
  </div>

  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:var(--canon-bg);border-color:var(--border)"></div>Canonico</div>
    <div class="legend-item"><div class="ldot" style="background:var(--filler-bg);border-color:var(--filler-border)"></div>Filler — salta</div>
    <div class="legend-item"><div class="ldot" style="background:var(--mixed-bg);border-color:var(--mixed-border)"></div>Misto</div>
    <div class="legend-item"><div class="ldot" style="background:var(--surface);border-color:var(--border);opacity:.5"></div>Visto / saltato</div>
    <div class="legend-item"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--star-on);margin-right:2px;vertical-align:middle"></span>Votato</div>
  </div>

  <div id="container"></div>
</div>

<div class="tt" id="tt">
  <div class="tt-num"         id="tt-num"></div>
  <div class="tt-type"        id="tt-type"></div>
  <div class="tt-stars-label">Voto</div>
  <div class="tt-stars"       id="tt-stars"></div>
  <div class="tt-hint">Click per dettagli</div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-ep-num"   id="modal-num"></div>
        <div class="modal-ep-title" id="modal-title"></div>
      </div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-badge" id="modal-badge"></div>
    <div class="modal-label">Il tuo voto</div>
    <div class="modal-stars" id="modal-stars"></div>
    <div class="modal-row">
      <a class="modal-btn" id="modal-watch-ita" href="#" target="_blank">▶ ITA</a>
      <a class="modal-btn" id="modal-watch-sub" href="#" target="_blank">▶ SUB ITA</a>
      <button class="modal-btn" id="modal-copy">Copia link</button>
    </div>
    <button class="modal-btn-main mark" id="modal-toggle">✓ Guardato</button>
  </div>
</div>

<script type="module">

const firebaseConfig = {

  authDomain: "onepiece-tracker-19c0d.firebaseapp.com",
  projectId: "onepiece-tracker-19c0d",

const app  = initializeApp(firebaseConfig);

// Logica per il Tema Scuro
const btnTheme = document.getElementById('btn-theme');
if (localStorage.getItem('op_theme') === 'dark') {
  document.body.classList.add('dark');
  btnTheme.textContent = '☀️ Tema';
}

btnTheme.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('op_theme', isDark ? 'dark' : 'light');
  btnTheme.textContent = isDark ? '☀️ Tema' : '🌙 Tema';
});

const BASE_ITA    = 'https://onepiecepower.com/anime18/onepiece/ita3/pagine/';
const BASE_SUBITA = 'https://onepiecepower.com/anime18/onepiece/subita2/pagine/';
function epUrl(n){ return BASE_ITA + String(n).padStart(3,'0'); }
function epUrlSub(n){ return BASE_SUBITA + String(n).padStart(3,'0'); }

function copyUrl(n, btn){
  navigator.clipboard.writeText(epUrl(n)).then(()=>{
    const orig=btn.textContent; btn.textContent='✓ Copiato!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); },1500);
  });
}

const SAGAS=[

  {name:"Punk Hazard",icon:"🧪",s:575,e:629},
  {name:"Dressrosa",icon:"🌹",s:630,e:699},
  {name:"Zou & Whole Cake Island",icon:"🍰",s:700,e:877},
  {name:"Wano",icon:"🗡️",s:878,e:1085},
  {name:"Egghead",icon:"🤖",s:1086,e:1155},
];
const TOTAL=SAGAS[SAGAS.length-1].e;

function epType(n){
  for(const[s,e]of FILLER)if(n>=s&&n<=e)return'filler';
  for(const[s,e]of MIXED)if(n>=s&&n<=e)return'mixed';
  return'canon';
}

let watched=new Set(), ratings={}, filter='all', currentUser=null, unsubSnap=null;

function loadLocal(){
  try{const d=localStorage.getItem('op_w');if(d)watched=new Set(JSON.parse(d));}catch(e){}
  try{const d=localStorage.getItem('op_r');if(d)ratings=JSON.parse(d);}catch(e){}
}

function saveLocal(){
  try{localStorage.setItem('op_w',JSON.stringify([...watched]));}catch(e){}
  try{localStorage.setItem('op_r',JSON.stringify(ratings));}catch(e){}
}

async function saveCloud(){
  if(!currentUser) return;
  const ref=doc(db,'users',currentUser.uid);
  await setDoc(ref,{ watched:[...watched], ratings },{merge:true});
  document.getElementById('auth-sync').textContent='Salvato ✓';
  setTimeout(()=>document.getElementById('auth-sync').textContent='',2000);
}

function save(){ saveLocal(); saveCloud(); }

function applyData(data){
  watched=new Set(data.watched||[]);
  ratings=data.ratings||{};
  render(); stats();
}

function subscribeCloud(uid){
  if(unsubSnap) unsubSnap();
  const ref=doc(db,'users',uid);
  unsubSnap=onSnapshot(ref,snap=>{ if(snap.exists()) applyData(snap.data()); });
}

document.getElementById('btn-login').addEventListener('click',()=>{
  signInWithPopup(auth, new GoogleAuthProvider()).catch(console.error);
});
document.getElementById('btn-logout').addEventListener('click',()=>{ signOut(auth); });

onAuthStateChanged(auth, user=>{
  currentUser=user;
  const loginBtn=document.getElementById('btn-login');
  const logoutBtn=document.getElementById('btn-logout');
  const avatar=document.getElementById('auth-avatar');
  const name=document.getElementById('auth-name');
  const hint=document.getElementById('auth-hint');
  const syncEl=document.getElementById('auth-sync');
  if(user){
    loginBtn.style.display='none'; logoutBtn.style.display='';
    avatar.src=user.photoURL||''; avatar.style.display='block';
    name.textContent=user.displayName||user.email; name.style.display='';
    hint.style.display='none'; syncEl.style.display='';
    subscribeCloud(user.uid);
  } else {
    if(unsubSnap){unsubSnap();unsubSnap=null;}
    loginBtn.style.display=''; logoutBtn.style.display='none';
    avatar.style.display='none'; name.style.display='none';
    hint.style.display=''; syncEl.style.display='none';
    loadLocal(); render(); stats();
  }
});

const tt=document.getElementById('tt');
let ttHide=null;

function typeLabel(t){
  if(t==='filler')return'🔴 Filler — puoi saltarlo';
  if(t==='mixed')return'🟡 Episodio misto';
  return'🟢 Canonico';
}

function showTT(ev,n,type){
  clearTimeout(ttHide);
  document.getElementById('tt-num').textContent='Episodio '+n;
  document.getElementById('tt-type').textContent=typeLabel(type);
  const el=document.getElementById('tt-stars'); el.innerHTML='';
  for(let i=1;i<=5;i++){
    const s=document.createElement('span');
    s.className='tt-star'+(ratings[n]>=i?' on':'');
    s.textContent='★'; el.appendChild(s);
  }
  posTT(ev); tt.style.display='block';
}
function hideTT(){ ttHide=setTimeout(()=>tt.style.display='none',80); }
function posTT(ev){
  const x=ev.clientX,y=ev.clientY,w=190,h=110;
  tt.style.left=(x+w+16>window.innerWidth?x-w-8:x+14)+'px';
  tt.style.top=(y+h+16>window.innerHeight?y-h-8:y+14)+'px';
}
document.addEventListener('mousemove',ev=>{ if(tt.style.display==='block') posTT(ev); });

let modalEp=null, modalSaga=null;
const overlay=document.getElementById('modal-overlay');
const modalClose=document.getElementById('modal-close');
const modalToggle=document.getElementById('modal-toggle');
const modalCopy=document.getElementById('modal-copy');
const modalWatchIta=document.getElementById('modal-watch-ita');
const modalWatchSub=document.getElementById('modal-watch-sub');

function renderModalStars(ep){
  const el=document.getElementById('modal-stars'); el.innerHTML='';
  for(let i=1;i<=5;i++){
    const s=document.createElement('span');
    s.className='modal-star'+(ratings[ep]>=i?' on':'');
    s.textContent='★'; s.dataset.v=i;
    s.addEventListener('mouseenter',()=>{
      el.querySelectorAll('.modal-star').forEach((x,idx)=>x.classList.toggle('on',idx<i));
    });
    s.addEventListener('mouseleave',()=>renderModalStars(ep));
    s.addEventListener('click',()=>{
      const v=parseInt(s.dataset.v);
      if(ratings[ep]===v) delete ratings[ep]; else ratings[ep]=v;
      save();
      const cell=document.querySelector(`.ep[data-ep="${ep}"]`);
      if(cell) cell.classList.toggle('has-rating',!!ratings[ep]);
      renderModalStars(ep);
    });
    el.appendChild(s);
  }
}

function openModal(n,saga){
  modalEp=n; modalSaga=saga;
  const t=epType(n);
  document.getElementById('modal-num').textContent='Episodio '+n;
  
  // Utilizza il titolo se presente, altrimenti fallback al numero
  const defaultTitle = 'Ep. ' + String(n).padStart(3, '0');
  document.getElementById('modal-title').textContent = EP_TITLES[n] || defaultTitle;
  
  const badge=document.getElementById('modal-badge');
  badge.textContent=typeLabel(t); badge.className='modal-badge '+t;
  renderModalStars(n);
  modalWatchIta.href=epUrl(n);
  modalWatchSub.href=epUrlSub(n);
  modalCopy.textContent='Copia link'; modalCopy.classList.remove('copied');
  modalCopy.onclick=()=>copyUrl(n,modalCopy);
  const isWatched=watched.has(n);
  modalToggle.textContent=isWatched?'Segna come non visto':'✓ Guardato';
  modalToggle.className='modal-btn-main '+(isWatched?'unmark':'mark');
  const banner=document.getElementById('prev-banner');
  if(banner){ banner.style.display='none'; modalToggle.style.display=''; }
  overlay.classList.add('open');
}

function closeModal(){ overlay.classList.remove('open'); modalEp=null; }
modalClose.addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function markEp(n,saga){
  watched.add(n); save();
  const cell=document.querySelector(`.ep[data-ep="${n}"]`);
  if(cell){ cell.classList.add('watched'); if(filter==='unwatched') cell.style.display='none'; }
  stats();
  if(saga){
    const seen=[...Array(saga.e-saga.s+1)].filter((_,i)=>watched.has(saga.s+i)).length;
    const sp=document.getElementById('sp-'+saga.s); if(sp) sp.textContent=seen+'/'+(saga.e-saga.s+1);
  }
}

function markPrevious(){ for(let i=1;i<modalEp;i++) watched.add(i); save(); render(); stats(); }

const prevBanner=document.createElement('div');
prevBanner.id='prev-banner';
prevBanner.style.cssText='display:none;margin-top:10px;padding:10px 12px;background:var(--surface);border-radius:9px;border:1px solid var(--border);font-size:13px;';
prevBanner.innerHTML=`<div style="color:var(--text-muted);margin-bottom:8px;">Ci sono episodi precedenti non segnati. Vuoi marcarli tutti come visti?</div><div style="display:flex;gap:8px;"><button id="prev-yes" style="flex:1;padding:7px;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;">Sì, segna tutti</button><button id="prev-no" style="flex:1;padding:7px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-size:13px;">No, solo questo</button></div>`;
document.getElementById('modal').appendChild(prevBanner);

modalToggle.addEventListener('click',()=>{
  if(modalEp===null) return;
  const n=modalEp, saga=modalSaga;
  const wasWatched=watched.has(n);
  if(wasWatched){
    watched.delete(n); save();
    const cell=document.querySelector(`.ep[data-ep="${n}"]`);
    if(cell) cell.classList.remove('watched');
    stats();
    if(saga){
      const seen=[...Array(saga.e-saga.s+1)].filter((_,i)=>watched.has(saga.s+i)).length;
      const sp=document.getElementById('sp-'+saga.s); if(sp) sp.textContent=seen+'/'+(saga.e-saga.s+1);
    }
    closeModal(); return;
  }
  let prevUnseen=0;
  for(let i=1;i<n;i++){ if(!watched.has(i)) prevUnseen++; }
  if(prevUnseen>0){
    modalToggle.style.display='none';
    prevBanner.style.display='block';
    prevBanner.querySelector('#prev-yes').onclick=()=>{ markPrevious(); markEp(n,saga); prevBanner.style.display='none'; modalToggle.style.display=''; closeModal(); };
    prevBanner.querySelector('#prev-no').onclick=()=>{ markEp(n,saga); prevBanner.style.display='none'; modalToggle.style.display=''; closeModal(); };
  } else {
    markEp(n,saga); closeModal();
  }
});

function updateNext(){
  document.querySelector('.ep.next-highlight')?.classList.remove('next-highlight');
  let next=null;
  for(let n=1;n<=TOTAL;n++){if(!watched.has(n)){next=n;break;}}
  const infoEl=document.getElementById('next-info');
  const linkIta=document.getElementById('link-next-ita');
  const linkSub=document.getElementById('link-next-sub');
  const gotoEl=document.getElementById('btn-next');
  if(!next){
    infoEl.innerHTML='<span style="color:var(--accent)">Hai visto tutto! 🎉</span>';
    linkIta.style.display='none'; linkSub.style.display='none'; gotoEl.style.display='none'; return;
  }
  linkIta.style.display=''; linkSub.style.display=''; gotoEl.style.display='';
  linkIta.href=epUrl(next); linkSub.href=epUrlSub(next);
  gotoEl.dataset.ep=next;
  const t=epType(next);
  const label=t==='filler'?'Filler':t==='mixed'?'Misto':'Canonico';
  infoEl.innerHTML=`Episodio <strong>${next}</strong> <span class="next-ep-type ${t}">${label}</span>`;
  const cell=document.querySelector(`.ep[data-ep="${next}"]`);
  if(cell) cell.classList.add('next-highlight');
}

document.getElementById('btn-next').addEventListener('click',()=>{
  const n=parseInt(document.getElementById('btn-next').dataset.ep); if(!n)return;
  filter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn[data-f="all"]').classList.add('active');
  document.querySelectorAll('.ep').forEach(c=>c.style.display='');
  const cell=document.querySelector(`.ep[data-ep="${n}"]`);
  if(cell){cell.scrollIntoView({behavior:'smooth',block:'center'});cell.style.outline='2.5px solid var(--accent)';setTimeout(()=>{cell.style.outline='';cell.classList.add('next-highlight');},1200);}
});

function stats(){
  let fw=0,cw=0;
  for(const ep of watched){epType(ep)==='filler'?fw++:cw++;}
  document.getElementById('st-watched').textContent=watched.size;
  document.getElementById('st-canon').textContent=cw;
  document.getElementById('st-filler').textContent=fw;
  document.getElementById('st-total').textContent=TOTAL;
  document.getElementById('progress').style.width=Math.round(watched.size/TOTAL*100)+'%';
  
  // Calcolo tempo speso
  const totalMins = watched.size * 20; // Media di 20 min a episodio
  const days = Math.floor(totalMins / 1440);
  const hours = Math.floor((totalMins % 1440) / 60);
  let timeStr = "";
  if (days > 0) timeStr += days + "g ";
  timeStr += hours + "h";
  document.getElementById('st-time').textContent = timeStr || "0h";

  updateNext();
}

function visible(n,type){
  if(filter==='canon')return type==='canon';
  if(filter==='filler')return type==='filler'||type==='mixed';
  if(filter==='unwatched')return !watched.has(n);
  if(filter==='rated')return !!ratings[n];
  return true;
}

function render(){
  const c=document.getElementById('container'); c.innerHTML='';
  for(const saga of SAGAS){
    const total=saga.e-saga.s+1;
    const seen=[...Array(total)].filter((_,i)=>watched.has(saga.s+i)).length;
    const div=document.createElement('div'); div.className='saga';
    const head=document.createElement('div'); head.className='saga-head';
    head.innerHTML=`<span class="saga-icon">${saga.icon}</span><span class="saga-name">${saga.name}</span><span class="saga-range">Ep. ${saga.s}–${saga.e}</span><span class="saga-progress" id="sp-${saga.s}">${seen}/${total}</span><button class="saga-btn" data-s="${saga.s}" data-e="${saga.e}">Segna tutti</button>`;
    const grid=document.createElement('div'); grid.className='ep-grid';
    for(let n=saga.s;n<=saga.e;n++){
      const t=epType(n);
      const cell=document.createElement('div');
      cell.className=`ep ${t}${watched.has(n)?' watched':''}${ratings[n]?' has-rating':''}`;
      cell.textContent=n; cell.dataset.ep=n; cell.dataset.t=t;
      if(!visible(n,t)) cell.style.display='none';
      cell.addEventListener('click',()=>openModal(n,saga));
      cell.addEventListener('mouseenter',ev=>showTT(ev,n,t));
      cell.addEventListener('mouseleave',hideTT);
      grid.appendChild(cell);
    }
    div.appendChild(head); div.appendChild(grid); c.appendChild(div);
    head.querySelector('.saga-btn').addEventListener('click',ev=>{
      ev.stopPropagation();
      const s=parseInt(ev.target.dataset.s),en=parseInt(ev.target.dataset.e);
      const all=[...Array(en-s+1)].every((_,i)=>watched.has(s+i));
      for(let i=s;i<=en;i++){all?watched.delete(i):watched.add(i);}
      save(); render(); stats();
    });
  }
  updateNext();
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); filter=btn.dataset.f;
    document.querySelectorAll('.ep').forEach(cell=>{
      cell.style.display=visible(parseInt(cell.dataset.ep),cell.dataset.t)?'':'none';
    });
  });
});

document.getElementById('ep-search').addEventListener('keydown',ev=>{
  if(ev.key!=='Enter')return;
  const n=parseInt(ev.target.value); if(!n)return;
  filter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn[data-f="all"]').classList.add('active');
  document.querySelectorAll('.ep').forEach(c=>c.style.display='');
  const cell=document.querySelector(`.ep[data-ep="${n}"]`);
  if(cell){cell.scrollIntoView({behavior:'smooth',block:'center'});cell.style.outline='2px solid var(--accent)';setTimeout(()=>cell.style.outline='',1500);}
  ev.target.value='';
});

document.getElementById('btn-skip-filler').addEventListener('click',()=>{
  for(const[s,e]of FILLER) for(let i=s;i<=e;i++) watched.add(i);
  save(); render(); stats();
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(confirm('Resettare tutti i progressi e i voti?')){ watched.clear(); ratings={}; save(); render(); stats(); }
});

loadLocal(); render(); stats();
</script>
</body>
</html>
